<svg width="100%" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@900&amp;display=swap');
      .title { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 88px; letter-spacing: 0.06em; }
      .sub   { font-family: 'Share Tech Mono', monospace; font-size: 18px; letter-spacing: 0.28em; }
      .mono  { font-family: 'Share Tech Mono', monospace; font-size: 13px; letter-spacing: 0.12em; }
      @keyframes glitch-r {
        0%,87%,100% { opacity:0; transform:none; }
        88% { opacity:.8; transform:translateX(-6px); }
        90% { opacity:0; }
        93% { opacity:.5; transform:translateX(6px); }
        95% { opacity:0; }
      }
      @keyframes glitch-c {
        0%,87%,100% { opacity:0; transform:none; }
        89% { opacity:.7; transform:translateX(6px); }
        91% { opacity:0; }
        94% { opacity:.4; transform:translateX(-5px); }
        96% { opacity:0; }
      }
      @keyframes name-flicker {
        0%,87%,100% { transform:none; }
        88% { transform:skew(-1.5deg); }
        90% { transform:skew(1.5deg) translateX(5px); }
        92% { transform:none; }
        94% { transform:skew(-.8deg) translateX(-3px); }
        96% { transform:none; }
      }
      @keyframes scan {
        0%   { transform: translateY(-340px); }
        100% { transform: translateY(340px); }
      }
      @keyframes blink { 50% { opacity:0; } }
      @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:.2; } }
      .glitch-r { animation: glitch-r 9s 2s infinite; }
      .glitch-c { animation: glitch-c 9s 2.08s infinite; }
      .main-name { animation: name-flicker 9s 2s infinite; }
      .scan-line { animation: scan 4s linear infinite; opacity:.04; }
      .cur { animation: blink 1s step-end infinite; }
      .dot { animation: pulse-dot 2.3s infinite; }
    </style>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1200" height="2" fill="transparent"/>
      <rect x="0" y="2" width="1200" height="2" fill="rgba(0,0,0,0.13)"/>
    </pattern>

    <!-- Dot grid -->
    <pattern id="dotgrid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(0,255,65,0.055)"/>
    </pattern>

    <!-- Glow filter for title -->
    <filter id="glow-r" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="#050005"/>

  <!-- Dot grid layer -->
  <rect width="1200" height="340" fill="url(#dotgrid)"
        mask="url(#grid-mask)"/>
  <defs>
    <mask id="grid-mask">
      <radialGradient id="gm" cx="50%" cy="50%" r="55%">
        <stop offset="0%" stop-color="white" stop-opacity="1"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </radialGradient>
      <rect width="1200" height="340" fill="url(#gm)"/>
    </mask>
  </defs>

  <!-- Scanlines overlay -->
  <rect width="1200" height="340" fill="url(#scanlines)"/>

  <!-- Animated scan beam -->
  <rect class="scan-line" x="0" y="0" width="1200" height="60"
        fill="linear-gradient(to bottom, transparent, rgba(255,45,45,0.06), transparent)"/>

  <!-- Left vertical accent line -->
  <line x1="68" y1="40" x2="68" y2="300" stroke="#ff2d2d" stroke-width="1.5" opacity="0.6"/>
  <line x1="72" y1="40" x2="72" y2="300" stroke="#ff2d2d" stroke-width="0.5" opacity="0.25"/>

  <!-- Right vertical accent line -->
  <line x1="1132" y1="40" x2="1132" y2="300" stroke="#ff2d2d" stroke-width="1.5" opacity="0.6"/>
  <line x1="1128" y1="40" x2="1128" y2="300" stroke="#ff2d2d" stroke-width="0.5" opacity="0.25"/>

  <!-- Top horizontal bar -->
  <line x1="68" y1="40" x2="1132" y2="40" stroke="#1a0000" stroke-width="1"/>
  <line x1="68" y1="42" x2="320" y2="42" stroke="#ff2d2d" stroke-width="0.5" opacity="0.4"/>
  <line x1="880" y1="42" x2="1132" y2="42" stroke="#ff2d2d" stroke-width="0.5" opacity="0.4"/>

  <!-- Bottom horizontal bar -->
  <line x1="68" y1="300" x2="1132" y2="300" stroke="#1a0000" stroke-width="1"/>
  <line x1="68" y1="298" x2="400" y2="298" stroke="#ff2d2d" stroke-width="0.5" opacity="0.4"/>
  <line x1="800" y1="298" x2="1132" y2="298" stroke="#ff2d2d" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner brackets TL -->
  <path d="M 68 40 L 68 68 M 68 40 L 108 40" stroke="#ff2d2d" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Corner brackets TR -->
  <path d="M 1132 40 L 1132 68 M 1132 40 L 1092 40" stroke="#ff2d2d" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Corner brackets BL -->
  <path d="M 68 300 L 68 272 M 68 300 L 108 300" stroke="#ff2d2d" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Corner brackets BR -->
  <path d="M 1132 300 L 1132 272 M 1132 300 L 1092 300" stroke="#ff2d2d" stroke-width="2" fill="none" opacity="0.9"/>

  <!-- Top badge bar -->
  <rect x="430" y="52" width="340" height="22" fill="rgba(255,45,45,0.08)" rx="1"/>
  <line x1="430" y1="52" x2="770" y2="52" stroke="rgba(255,45,45,0.5)" stroke-width="0.5"/>
  <line x1="430" y1="74" x2="770" y2="74" stroke="rgba(255,45,45,0.5)" stroke-width="0.5"/>
  <text class="mono" x="600" y="67" text-anchor="middle" fill="#ff2d2d" opacity="0.9">
    // RED TEAM RECON &amp; PENTEST FRAMEWORK //
  </text>

  <!-- ── MAIN TITLE (glitch layers) ── -->
  <!-- Red glitch layer -->
  <text class="title glitch-r"
        x="600" y="198"
        text-anchor="middle"
        fill="#ff2d2d"
        opacity="0"
        clip-path="url(#clip-r)">PhantomStrike</text>
  <defs>
    <clipPath id="clip-r">
      <rect x="0" y="145" width="1200" height="46"/>
    </clipPath>
    <clipPath id="clip-c">
      <rect x="0" y="185" width="1200" height="44"/>
    </clipPath>
  </defs>

  <!-- Cyan glitch layer -->
  <text class="title glitch-c"
        x="600" y="198"
        text-anchor="middle"
        fill="#00cfff"
        opacity="0"
        clip-path="url(#clip-c)">PhantomStrike</text>

  <!-- Glow behind main title -->
  <text class="title"
        x="600" y="198"
        text-anchor="middle"
        fill="#ff2d2d"
        opacity="0.2"
        filter="url(#glow-r)">PhantomStrike</text>

  <!-- Main title -->
  <text class="title main-name"
        x="600" y="198"
        text-anchor="middle"
        fill="#ff2d2d"
        style="text-shadow:0 0 40px rgba(255,45,45,0.5)">PhantomStrike</text>

  <!-- Divider line under title -->
  <line x1="240" y1="216" x2="960" y2="216"
        stroke="rgba(255,45,45,0.3)" stroke-width="0.5"/>
  <line x1="560" y1="216" x2="640" y2="216"
        stroke="#ff2d2d" stroke-width="1.5" opacity="0.8"/>

  <!-- Subtitle -->
  <text class="sub" x="600" y="248" text-anchor="middle" fill="#c8ffc8" opacity="0.55">
    Nmap · Shodan · Metasploit · SSH · DNS · CVE · EDB
  </text>

  <!-- Bottom info row -->
  <!-- Status dot -->
  <circle class="dot" cx="96" cy="282" r="4" fill="#ff2d2d"/>
  <text class="mono" x="108" y="286" fill="#ff2d2d" opacity="0.75">ACTIVE</text>

  <!-- Author left -->
  <text class="mono" x="200" y="286" fill="rgba(200,255,200,0.35)">author:</text>
  <text class="mono" x="270" y="286" fill="rgba(200,255,200,0.7)">krypthane</text>

  <!-- Center version -->
  <text class="mono" x="600" y="286" text-anchor="middle" fill="rgba(255,45,45,0.5)">
    v1.0 · authorized use only
  </text>

  <!-- Right github -->
  <text class="mono" x="930" y="286" fill="rgba(200,255,200,0.35)">github:</text>
  <text class="mono" x="1000" y="286" fill="rgba(200,255,200,0.7)">wavegxz-design</text>

  <!-- Typing line at very bottom -->
  <text class="mono" x="92" y="316" fill="#00ff41" opacity="0.4">
    $ ./phantomstrike.py -vv
    <tspan class="cur" fill="#00ff41" opacity="0.8">▌</tspan>
  </text>
</svg>
